spring:
  application:
    name: timeops-backend
  datasource:
    url: jdbc:postgresql://${TIMEOPS_DB_HOST:localhost}:${TIMEOPS_DB_PORT:5432}/${TIMEOPS_DB_NAME:timeops}
    username: ${TIMEOPS_DB_USERNAME:timeops}
    password: ${TIMEOPS_DB_PASSWORD:timeops}
  flyway:
    enabled: true
    placeholders:
      initial-admin-password-hash: ${TIMEOPS_INITIAL_ADMIN_PASSWORD_HASH}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
server:
  port: 8080
timeops:
  security:
    crypto:
      secret: ${TIMEOPS_CRYPTO_SECRET}
    jwt:
      secret: ${TIMEOPS_JWT_SECRET}
      expiration-seconds: ${TIMEOPS_JWT_EXPIRATION_SECONDS:86400}
  ssh:
    mode: ${TIMEOPS_SSH_MODE:simulated}
    connect-timeout-millis: ${TIMEOPS_SSH_CONNECT_TIMEOUT_MILLIS:5000}
    command-timeout-millis: ${TIMEOPS_SSH_COMMAND_TIMEOUT_MILLIS:1800000}
    strict-host-key-checking: ${TIMEOPS_SSH_STRICT_HOST_KEY_CHECKING:false}
